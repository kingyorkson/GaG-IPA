<!DOCTYPE html>
<html>
<head><title>Authentication</title></head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#1a1a2e;color:#fff;font-family:Arial;flex-direction:column;">
  <h2>Authentication successful!</h2>
  <p>You can close this tab and return to the game.</p>
  <p id="status" style="color:#aaa;">Processing...</p>
  <script>
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', '?'));
    const accessToken = params.get('access_token');
    if (accessToken) {
      if (window.opener) {
        window.opener.postMessage({ type: 'supabase-auth', hash: hash }, window.location.origin);
      }
      document.getElementById('status').textContent = '✓ Session transferred to game.';
    } else {
      document.getElementById('status').textContent = 'No session found. Try again.';
    }
    if (window.opener) {
      setTimeout(() => window.close(), 3000);
    }
  </script>
</body>
</html>
